<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MeterMonitor Addon Docs</title>
    <link rel="icon" href="logo.png" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <style>
      :root {
        --theme-color: #c14b2e;
      }

      body {
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        background: #f7f2ea;
      }

      .sidebar {
        background: #fffdf8;
      }

      .sidebar .app-name {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 700;
      }

      .sidebar .app-name img {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid #eadfce;
      }

      .markdown-section {
        max-width: 900px;
      }
    </style>
  </head>
  <body>
    <div id="app">Loading docs...</div>

    <script>
      window.$docsify = {
        name: "MeterMonitor",
        logo: "logo.png",
        loadSidebar: true,
        subMaxLevel: 2,
        auto2top: true,
        homepage: "README.md",
        executeScript: false,
        search: "auto",
        repo: "",
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  </body>
</html>
